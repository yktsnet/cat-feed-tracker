services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-cat_feed}
      POSTGRES_USER: ${DB_USER:-cat_feed}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cat_feed}
    volumes:
      - ./server/migrations:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cat_feed}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
